<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jadwal Perkuliahan Mahasiswa</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: #dfe7d6;
      --panel: #f2f5ec;
      --navy: #1f4e95;
      --navy-dark: #173d75;
      --grid: #333;
      --soft-grid: #8c8c8c;
      --text: #102030;
      --muted: #4d5b68;
      --special: #d9ead3;
      --special-dark: #2d5c16;
      --empty: #d9d9d9;
      --chip: #eef5ff;
      --danger: #b10000;
      --radius: 14px;
      --shadow: 0 10px 28px rgba(0,0,0,.12);
      --room-f6: #f1f500;
      --room-f4: #00d8e6;
      --room-default: #dce6f1;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        linear-gradient(rgba(223, 231, 214, 0.88), rgba(223, 231, 214, 0.88)),
        radial-gradient(circle at top left, #ffffff 0%, #dfe7d6 48%, #c8d6bf 100%);
      min-height: 100vh;
    }

    .app {
      width: min(1900px, 100%);
      margin: 0 auto;
      padding: 16px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1.8fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }

    .hero, .sidepanel, .table-wrap {
      background: rgba(255,255,255,.74);
      backdrop-filter: blur(3px);
      border: 1px solid rgba(255,255,255,.45);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 16px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      min-height: 108px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: clamp(26px, 3vw, 42px);
      line-height: 1.05;
      color: var(--navy-dark);
      letter-spacing: .2px;
    }

    .hero .sub {
      margin: 0;
      color: var(--muted);
      font-size: clamp(13px, 1.2vw, 17px);
    }

    .clock {
      min-width: 230px;
      text-align: right;
    }

    .clock .time {
      font-size: clamp(32px, 4vw, 52px);
      font-weight: 700;
      color: var(--navy-dark);
      line-height: 1;
      letter-spacing: 1px;
    }

    .clock .date {
      margin-top: 6px;
      font-size: clamp(13px, 1.2vw, 18px);
      color: var(--muted);
    }

    .sidepanel {
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      justify-content: center;
    }

    .controls-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .day-btn, .action-btn, .file-label {
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      transition: .18s ease;
      font-size: 14px;
    }

    .day-btn {
      background: #e8eef8;
      color: var(--navy-dark);
    }

    .day-btn.active,
    .day-btn:hover {
      background: var(--navy);
      color: #fff;
    }

    .action-btn,
    .file-label {
      background: #eef4ea;
      color: #24440f;
      border: 1px solid #d0ddc5;
    }

    .action-btn:hover,
    .file-label:hover {
      background: #dfead8;
    }

    .file-label input {
      display: none;
    }

    .status-line {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--chip);
      color: var(--navy-dark);
      font-weight: 700;
      margin-right: 6px;
      margin-bottom: 4px;
    }

    .table-wrap {
      padding: 12px;
      overflow: auto;
    }

    table.schedule {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
    }

    .schedule th,
    .schedule td {
      border: 1px solid var(--grid);
      text-align: center;
      vertical-align: middle;
      padding: 6px;
    }

    .schedule thead th {
      color: #fff;
      background: var(--navy);
      font-size: clamp(12px, 1vw, 16px);
      font-weight: 700;
      padding: 10px 6px;
    }

    .schedule thead th.room-head {
      color: #111;
      font-weight: 800;
      letter-spacing: .2px;
    }

    .schedule thead th.room-head.group-f6 { background: var(--room-f6); }
    .schedule thead th.room-head.group-f4 { background: var(--room-f4); }
    .schedule thead th.room-head.group-default { background: var(--room-default); }

    .col-session { width: 72px; }
    .col-time { width: 112px; }
    .col-room { width: minmax(120px, 1fr); }

    td.session-cell {
      background: #f6f6f6;
      font-weight: 700;
      font-size: 13px;
    }

    td.session-empty {
      background: #f6f6f6;
    }

    td.time-cell {
      background: #f3f3f3;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    td.empty-cell {
      background: var(--empty);
      height: 38px;
    }

    td.course-cell {
      font-size: 12px;
      line-height: 1.25;
      font-weight: 700;
      padding: 6px 5px;
      word-break: break-word;
    }

    .course-code {
      font-size: 11px;
      margin-bottom: 4px;
    }

    .course-name {
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .course-meta {
      font-size: 10.5px;
      font-weight: 600;
      opacity: .95;
      margin-top: 3px;
    }

    td.special-time {
      background: #eef5e8;
      font-size: 12px;
      font-weight: 700;
    }

    td.special-cell {
      background: var(--special);
      color: var(--special-dark);
      font-weight: 800;
      letter-spacing: .2px;
      font-size: 12px;
      padding: 4px 8px;
    }

    .footer-note {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .error-box {
      background: #fff0f0;
      border: 1px solid #f1b1b1;
      color: #7b1d1d;
      border-radius: 12px;
      padding: 14px;
      font-size: 14px;
      line-height: 1.5;
    }

    @media (max-width: 1100px) {
      .topbar {
        grid-template-columns: 1fr;
      }
      .hero {
        flex-direction: column;
        align-items: flex-start;
      }
      .clock {
        text-align: left;
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <section class="hero">
        <div>
          <h1>Jadwal Perkuliahan Mahasiswa</h1>
          <p class="sub">Template ini membaca data dari file Excel multi-sheet dan menampilkan jadwal per hari untuk layar besar.</p>
        </div>
        <div class="clock">
          <div class="time" id="clockTime">--:--:--</div>
          <div class="date" id="clockDate">Memuat tanggal...</div>
        </div>
      </section>

      <aside class="sidepanel">
        <div class="controls-row" id="dayButtons"></div>
        <div class="controls-row">
          <button class="action-btn" id="reloadBtn" type="button">Muat ulang file default</button>
          <label class="file-label" for="fileInput">Buka file Excel lokal
            <input id="fileInput" type="file" accept=".xlsx,.xls" />
          </label>
        </div>
        <div class="status-line">
          <span class="status-chip" id="sheetStatus">Sheet: -</span>
          <span class="status-chip" id="fileStatus">Sumber: file default</span>
          <span class="status-chip" id="activeDayStatus">Hari aktif: -</span>
          <span class="status-chip" id="refreshStatus">Auto-refresh: -</span>
          <div id="statusText">Menunggu data...</div>
        </div>
      </aside>
    </div>

    <div class="table-wrap" id="tableWrap">
      <div class="error-box">Sedang memuat file Excel...</div>
    </div>
  </div>

  <script>
    const CONFIG = {
      workbookFile: './template_jadwal_perkuliahan_mahasiswa_github.xlsx',
      requiredSheets: ['SLOT_WAKTU', 'RUANG_DISPLAY', 'JADWAL_KULIAH'],
      fallbackDays: ['Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'],
      roomHeaderClasses: {
        F6: 'group-f6',
        F4: 'group-f4'
      },
      autoRefreshMs: 60000
    };

    const state = {
      workbook: null,
      data: null,
      selectedDay: 'Senin',
      sourceLabel: 'file default',
      sourceKind: 'default',
      workbookHash: '',
      autoRefreshTimer: null,
      autoRefreshBusy: false,
      lastSyncText: '-'
    };

    const el = {
      tableWrap: document.getElementById('tableWrap'),
      dayButtons: document.getElementById('dayButtons'),
      reloadBtn: document.getElementById('reloadBtn'),
      fileInput: document.getElementById('fileInput'),
      sheetStatus: document.getElementById('sheetStatus'),
      fileStatus: document.getElementById('fileStatus'),
      activeDayStatus: document.getElementById('activeDayStatus'),
      refreshStatus: document.getElementById('refreshStatus'),
      statusText: document.getElementById('statusText'),
      clockTime: document.getElementById('clockTime'),
      clockDate: document.getElementById('clockDate')
    };

    function normalizeText(value) {
      return String(value ?? '').trim();
    }

    function normalizeKey(value) {
      return normalizeText(value)
        .normalize('NFKD')
        .replace(/[^a-zA-Z0-9/]+/g, '')
        .toUpperCase();
    }

    function isYes(value) {
      return ['ya', 'y', 'true', '1', 'aktif'].includes(normalizeText(value).toLowerCase());
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function normalizeHexColor(value) {
      const raw = normalizeText(value).replace(/[^#a-fA-F0-9]/g, '');
      if (!raw) return '';
      if (raw.startsWith('#')) {
        if (raw.length === 4) return ('#' + raw.slice(1).split('').map(ch => ch + ch).join('')).toUpperCase();
        if (raw.length === 7) return raw.toUpperCase();
        if (raw.length === 9) return ('#' + raw.slice(3)).toUpperCase();
      }
      if (/^[A-Fa-f0-9]{6}$/.test(raw)) return ('#' + raw).toUpperCase();
      if (/^[A-Fa-f0-9]{8}$/.test(raw)) return ('#' + raw.slice(2)).toUpperCase();
      return '';
    }

    function getCanonicalKey(rawKey) {
      const key = normalizeKey(rawKey);
      const aliasMap = {
        HARI: 'HARI',
        HARIKULIAH: 'HARI',
        DAY: 'HARI',
        KODERUANG: 'KODE_RUANG',
        RUANG: 'KODE_RUANG',
        RUANGAN: 'KODE_RUANG',
        IDSLOTMULAI: 'ID_SLOT_MULAI',
        SLOTMULAI: 'ID_SLOT_MULAI',
        STARTSLOT: 'ID_SLOT_MULAI',
        IDSLOTSELESAI: 'ID_SLOT_SELESAI',
        SLOTSELESAI: 'ID_SLOT_SELESAI',
        ENDSLOT: 'ID_SLOT_SELESAI',
        KODEMK: 'KODE_MK',
        MATAKULIAHKODE: 'KODE_MK',
        NAMAMK: 'NAMA_MK',
        MATAKULIAH: 'NAMA_MK',
        NAMAMATAKULIAH: 'NAMA_MK',
        DOSEN: 'DOSEN',
        DOSENPENGAMPU: 'DOSEN',
        KELAS: 'KELAS',
        PROGRAMANGKATAN: 'PROGRAM/ANGKATAN',
        PROGRAM: 'PROGRAM/ANGKATAN',
        ANGKATAN: 'PROGRAM/ANGKATAN',
        CATATAN: 'CATATAN',
        KETERANGAN: 'CATATAN',
        NOTE: 'CATATAN',
        WARNABG: 'WARNA_BG',
        BACKGROUND: 'WARNA_BG',
        BGCOLOR: 'WARNA_BG',
        WARNATEXT: 'WARNA_TEXT',
        TEXTCOLOR: 'WARNA_TEXT',
        FONTCOLOR: 'WARNA_TEXT',
        AKTIF: 'AKTIF'
      };
      return aliasMap[key] || rawKey;
    }

    function sheetToObjects(workbook, sheetName) {
      const sheet = workbook.Sheets[sheetName];
      if (!sheet) return [];
      return XLSX.utils.sheet_to_json(sheet, { defval: '' });
    }

    function sheetToObjectsWithMeta(workbook, sheetName) {
      const sheet = workbook.Sheets[sheetName];
      if (!sheet || !sheet['!ref']) return [];
      const range = XLSX.utils.decode_range(sheet['!ref']);
      const headers = [];
      for (let c = range.s.c; c <= range.e.c; c += 1) {
        const address = XLSX.utils.encode_cell({ r: range.s.r, c });
        headers.push(normalizeText(sheet[address]?.v));
      }

      const rows = [];
      for (let r = range.s.r + 1; r <= range.e.r; r += 1) {
        const rowObj = { __sheetName: sheetName, __sheetRowNum: r + 1 };
        let hasContent = false;
        headers.forEach((header, index) => {
          if (!header) return;
          const address = XLSX.utils.encode_cell({ r, c: range.s.c + index });
          const cell = sheet[address];
          const value = cell?.v ?? '';
          rowObj[getCanonicalKey(header)] = value;
          if (normalizeText(value) !== '') hasContent = true;
        });
        if (hasContent) rows.push(rowObj);
      }
      return rows;
    }

    function getStyleColorToken(colorObj) {
      if (!colorObj) return '';
      if (typeof colorObj === 'string') return normalizeHexColor(colorObj);
      return normalizeHexColor(colorObj.rgb || colorObj.argb || colorObj.value || colorObj.raw || colorObj.hex || '');
    }

    function extractColorsFromCell(cell) {
      if (!cell || !cell.s) return { bg: '', text: '' };
      const style = cell.s;
      const bg =
        getStyleColorToken(style.fill?.fgColor) ||
        getStyleColorToken(style.fill?.bgColor) ||
        getStyleColorToken(style.fgColor) ||
        getStyleColorToken(style.bgColor) ||
        getStyleColorToken(style.patternFill?.fgColor) ||
        getStyleColorToken(style.patternFill?.bgColor);
      const text =
        getStyleColorToken(style.font?.color) ||
        getStyleColorToken(style.color);
      return { bg, text };
    }

    function buildCanonicalHeaderMap(workbook, sheetName) {
      const map = new Map();
      const sheet = workbook.Sheets[sheetName];
      if (!sheet || !sheet['!ref']) return map;
      const range = XLSX.utils.decode_range(sheet['!ref']);
      for (let c = range.s.c; c <= range.e.c; c += 1) {
        const address = XLSX.utils.encode_cell({ r: range.s.r, c });
        const header = normalizeText(sheet[address]?.v);
        if (!header) continue;
        map.set(getCanonicalKey(header), c);
      }
      return map;
    }

    function getSheetCell(workbook, sheetName, rowNum, headerMap, canonicalHeader) {
      const colIndex = headerMap.get(canonicalHeader);
      if (colIndex === undefined) return null;
      const sheet = workbook.Sheets[sheetName];
      const address = XLSX.utils.encode_cell({ r: Number(rowNum) - 1, c: colIndex });
      return sheet?.[address] || null;
    }

    function enrichScheduleColors(workbook, item, headerMap) {
      item.WARNA_BG = normalizeHexColor(item.WARNA_BG);
      item.WARNA_TEXT = normalizeHexColor(item.WARNA_TEXT);

      if (item.WARNA_BG && item.WARNA_TEXT) return item;

      const probeHeaders = ['NAMA_MK', 'KODE_MK', 'KELAS', 'DOSEN', 'CATATAN', 'WARNA_BG', 'WARNA_TEXT'];
      for (const header of probeHeaders) {
        const cell = getSheetCell(workbook, 'JADWAL_KULIAH', item.__sheetRowNum, headerMap, header);
        const colors = extractColorsFromCell(cell);
        if (!item.WARNA_BG && colors.bg) item.WARNA_BG = colors.bg;
        if (!item.WARNA_TEXT && colors.text) item.WARNA_TEXT = colors.text;
        if (item.WARNA_BG && item.WARNA_TEXT) break;
      }

      if (!item.WARNA_BG) item.WARNA_BG = '#D9D9D9';
      if (!item.WARNA_TEXT) item.WARNA_TEXT = '#111111';
      return item;
    }

    function groupSessionRows(slots) {
      const groups = new Map();
      slots.forEach(slot => {
        if (normalizeText(slot.TIPE_BARIS).toUpperCase() === 'KULIAH') {
          const key = normalizeText(slot.SESI) || '-';
          groups.set(key, (groups.get(key) || 0) + 1);
        }
      });
      return groups;
    }

    function getRoomHeaderClass(room) {
      const group = normalizeText(room.GRUP_WARNA).toUpperCase();
      return CONFIG.roomHeaderClasses[group] || 'group-default';
    }

    function formatSpecialText(slot) {
      return normalizeText(slot.KETERANGAN) || 'Informasi akademik';
    }

    function buildDataModel(workbook) {
      const sheetNames = workbook.SheetNames || [];
      const slots = sheetToObjects(workbook, 'SLOT_WAKTU')
        .filter(row => isYes(row.TAMPIL_DI_LAYAR))
        .sort((a, b) => Number(a.URUTAN || 0) - Number(b.URUTAN || 0));

      const rooms = sheetToObjects(workbook, 'RUANG_DISPLAY')
        .filter(row => isYes(row.AKTIF))
        .sort((a, b) => Number(a.URUTAN_KOLOM || 0) - Number(b.URUTAN_KOLOM || 0));

      const scheduleHeaderMap = buildCanonicalHeaderMap(workbook, 'JADWAL_KULIAH');
      const schedules = sheetToObjectsWithMeta(workbook, 'JADWAL_KULIAH')
        .filter(row => !normalizeText(row.AKTIF) || isYes(row.AKTIF))
        .map(row => enrichScheduleColors(workbook, row, scheduleHeaderMap));

      const holidays = sheetToObjects(workbook, 'LIBUR_AKADEMIK')
        .filter(row => isYes(row.TAMPIL_DI_APLIKASI));

      const availableDaysSet = new Set();
      schedules.forEach(row => {
        const day = normalizeText(row.HARI);
        if (day) availableDaysSet.add(day);
      });

      const availableDays = CONFIG.fallbackDays.filter(day => availableDaysSet.has(day));
      const finalDays = availableDays.length ? availableDays : [...availableDaysSet];

      return {
        sheetNames,
        slots,
        rooms,
        schedules,
        holidays,
        days: finalDays.length ? finalDays : CONFIG.fallbackDays
      };
    }

    function getScheduleItemForSlot(day, roomCode, slotId) {
      const targetDay = normalizeText(day).toLowerCase();
      const targetRoom = normalizeText(roomCode);
      const numericSlotId = Number(slotId);
      return state.data.schedules.find(item => {
        const itemDay = normalizeText(item.HARI).toLowerCase();
        const itemRoom = normalizeText(item.KODE_RUANG);
        const start = Number(item.ID_SLOT_MULAI);
        const end = Number(item.ID_SLOT_SELESAI || item.ID_SLOT_MULAI);
        return itemDay === targetDay && itemRoom === targetRoom && numericSlotId >= start && numericSlotId <= end;
      }) || null;
    }

    function renderCourseCell(item) {
      const bg = normalizeHexColor(item.WARNA_BG) || '#D9D9D9';
      const color = normalizeHexColor(item.WARNA_TEXT) || '#111111';
      return `
        <td class="course-cell" style="background:${escapeHtml(bg)};color:${escapeHtml(color)};">
          <div class="course-code">${escapeHtml(item.KODE_MK || '')}${item.KELAS ? ` (${escapeHtml(item.KELAS)})` : ''}</div>
          <div class="course-name">${escapeHtml(item.NAMA_MK || '')}</div>
          ${item.DOSEN ? `<div class="course-meta">Dosen : ${escapeHtml(item.DOSEN)}</div>` : ''}
          ${item['PROGRAM/ANGKATAN'] ? `<div class="course-meta">${escapeHtml(item['PROGRAM/ANGKATAN'])}</div>` : ''}
          ${item.CATATAN ? `<div class="course-meta">${escapeHtml(item.CATATAN)}</div>` : ''}
        </td>
      `;
    }

    function renderTable(day) {
      if (!state.data) return;

      const slots = state.data.slots;
      const rooms = state.data.rooms;
      const sessionGroups = groupSessionRows(slots);
      const renderedSessionStart = new Set();

      let html = `
        <table class="schedule">
          <thead>
            <tr>
              <th class="col-session">SESI</th>
              <th class="col-time">JAM</th>
              ${rooms.map(room => `<th class="room-head ${getRoomHeaderClass(room)}">${escapeHtml(room.NAMA_TAMPIL || room.KODE_RUANG)}</th>`).join('')}
            </tr>
          </thead>
          <tbody>
      `;

      for (const slot of slots) {
        const slotId = Number(slot.ID_SLOT);
        const slotType = normalizeText(slot.TIPE_BARIS).toUpperCase();
        html += '<tr>';

        if (slotType === 'KULIAH') {
          const sesi = normalizeText(slot.SESI) || '-';
          if (!renderedSessionStart.has(sesi)) {
            html += `<td class="session-cell" rowspan="${sessionGroups.get(sesi) || 1}">${escapeHtml(sesi)}</td>`;
            renderedSessionStart.add(sesi);
          }

          html += `<td class="time-cell">${escapeHtml(slot.LABEL_TAMPIL)}</td>`;

          for (const room of rooms) {
            const roomCode = normalizeText(room.KODE_RUANG);
            const item = getScheduleItemForSlot(day, roomCode, slotId);
            html += item ? renderCourseCell(item) : '<td class="empty-cell"></td>';
          }
        } else {
          html += '<td class="session-empty"></td>';
          html += `<td class="special-time">${escapeHtml(slot.LABEL_TAMPIL)}</td>`;
          html += `<td class="special-cell" colspan="${rooms.length}">${escapeHtml(formatSpecialText(slot))}</td>`;
        }

        html += '</tr>';
      }

      html += `
          </tbody>
        </table>
        <div class="footer-note">
          <div>Warna sel diambil otomatis dari kolom <strong>WARNA_BG</strong> dan <strong>WARNA_TEXT</strong> pada sheet <strong>JADWAL_KULIAH</strong>. Jika kolom kosong, sistem akan mencoba membaca style warna langsung dari baris Excel.</div>
          <div>Sinkron terakhir: <strong>${escapeHtml(state.lastSyncText)}</strong>.</div>
        </div>
      `;

      el.tableWrap.innerHTML = html;
      el.activeDayStatus.textContent = `Hari aktif: ${day}`;
    }

    function renderDayButtons() {
      if (!state.data || !state.data.days.length) {
        el.dayButtons.innerHTML = '';
        return;
      }

      el.dayButtons.innerHTML = state.data.days
        .map(day => `<button type="button" class="day-btn ${day === state.selectedDay ? 'active' : ''}" data-day="${escapeHtml(day)}">${escapeHtml(day)}</button>`)
        .join('');

      el.dayButtons.querySelectorAll('.day-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          state.selectedDay = btn.dataset.day;
          renderDayButtons();
          renderTable(state.selectedDay);
        });
      });
    }

    function renderStatus(message = '') {
      if (!state.data) return;
      el.sheetStatus.textContent = `Sheet: ${state.data.sheetNames.join(', ')}`;
      el.fileStatus.textContent = `Sumber: ${state.sourceLabel}`;
      el.refreshStatus.textContent = `Auto-refresh: ${state.sourceKind === 'default' ? `aktif / ${Math.round(CONFIG.autoRefreshMs / 1000)} dtk` : 'nonaktif (file lokal)'}`;

      const missingRequired = CONFIG.requiredSheets.filter(name => !state.data.sheetNames.includes(name));
      if (missingRequired.length) {
        el.statusText.innerHTML = `Sheet wajib belum lengkap: <strong>${missingRequired.join(', ')}</strong>`;
      } else if (message) {
        el.statusText.innerHTML = message;
      } else {
        el.statusText.innerHTML = `Terbaca ${state.data.rooms.length} ruang aktif, ${state.data.slots.length} slot tampil, dan ${state.data.schedules.length} jadwal aktif. Sinkron terakhir: <strong>${escapeHtml(state.lastSyncText)}</strong>.`;
      }
    }

    function validateRequiredSheets(data) {
      const missing = CONFIG.requiredSheets.filter(name => !data.sheetNames.includes(name));
      if (missing.length) {
        throw new Error(`Sheet wajib belum ditemukan: ${missing.join(', ')}`);
      }
    }

    function nowText() {
      return new Intl.DateTimeFormat('id-ID', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      }).format(new Date());
    }

    async function computeBufferHash(arrayBuffer) {
      const hashBuffer = await crypto.subtle.digest('SHA-256', arrayBuffer);
      return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function fetchWorkbookArrayBuffer(url, bustCache = false) {
      const fetchUrl = bustCache ? `${url}${url.includes('?') ? '&' : '?'}v=${Date.now()}` : url;
      const response = await fetch(fetchUrl, { cache: 'no-store' });
      if (!response.ok) {
        throw new Error(`Gagal mengambil file Excel. Pastikan file <strong>${url}</strong> ada di folder yang sama dengan index.html di GitHub Pages.`);
      }
      return response.arrayBuffer();
    }

    function stopAutoRefresh() {
      if (state.autoRefreshTimer) {
        clearInterval(state.autoRefreshTimer);
        state.autoRefreshTimer = null;
      }
    }

    function startAutoRefresh() {
      stopAutoRefresh();
      if (state.sourceKind !== 'default') return;
      state.autoRefreshTimer = setInterval(checkWorkbookUpdate, CONFIG.autoRefreshMs);
    }

    async function applyWorkbook(arrayBuffer, sourceLabel, sourceKind, knownHash = '') {
      const workbook = XLSX.read(arrayBuffer, { type: 'array', cellStyles: true });
      state.workbook = workbook;
      state.data = buildDataModel(workbook);
      state.sourceLabel = sourceLabel;
      state.sourceKind = sourceKind;
      state.workbookHash = knownHash || await computeBufferHash(arrayBuffer);
      state.lastSyncText = nowText();
      validateRequiredSheets(state.data);
      if (!state.data.days.includes(state.selectedDay)) {
        state.selectedDay = state.data.days[0] || 'Senin';
      }
      renderDayButtons();
      renderTable(state.selectedDay);
      renderStatus();
      if (sourceKind === 'default') startAutoRefresh();
      else stopAutoRefresh();
    }

    async function loadWorkbookFromUrl(url, sourceLabel = 'file default') {
      const arrayBuffer = await fetchWorkbookArrayBuffer(url, true);
      const hash = await computeBufferHash(arrayBuffer);
      await applyWorkbook(arrayBuffer, sourceLabel, 'default', hash);
    }

    async function loadWorkbookFromFile(file) {
      const arrayBuffer = await file.arrayBuffer();
      await applyWorkbook(arrayBuffer, file.name, 'local');
    }

    async function checkWorkbookUpdate() {
      if (state.autoRefreshBusy || state.sourceKind !== 'default') return;
      state.autoRefreshBusy = true;
      try {
        const arrayBuffer = await fetchWorkbookArrayBuffer(CONFIG.workbookFile, true);
        const hash = await computeBufferHash(arrayBuffer);
        if (hash !== state.workbookHash) {
          await applyWorkbook(arrayBuffer, state.sourceLabel || 'file default', 'default', hash);
          renderStatus(`File Excel diperbarui otomatis. Sinkron terakhir: <strong>${escapeHtml(state.lastSyncText)}</strong>.`);
        }
      } catch (error) {
        renderStatus(`Auto-refresh gagal sementara: <strong>${escapeHtml(error.message)}</strong>.`);
      } finally {
        state.autoRefreshBusy = false;
      }
    }

    function showError(message) {
      el.tableWrap.innerHTML = `<div class="error-box">${message}</div>`;
      el.statusText.textContent = 'Terjadi masalah saat membaca file.';
    }

    function startClock() {
      const formatterTime = new Intl.DateTimeFormat('id-ID', {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });
      const formatterDate = new Intl.DateTimeFormat('id-ID', {
        weekday: 'long',
        day: '2-digit',
        month: 'long',
        year: 'numeric'
      });

      const tick = () => {
        const now = new Date();
        el.clockTime.textContent = formatterTime.format(now);
        el.clockDate.textContent = formatterDate.format(now);
      };

      tick();
      setInterval(tick, 1000);
    }

    el.reloadBtn.addEventListener('click', async () => {
      try {
        await loadWorkbookFromUrl(CONFIG.workbookFile, 'file default');
      } catch (error) {
        showError(error.message);
      }
    });

    el.fileInput.addEventListener('change', async (event) => {
      const file = event.target.files?.[0];
      if (!file) return;
      try {
        await loadWorkbookFromFile(file);
      } catch (error) {
        showError(error.message);
      }
    });

    startClock();

    loadWorkbookFromUrl(CONFIG.workbookFile, 'file default').catch(error => {
      showError(`${error.message}<br><br>Alternatif cepat: klik <strong>Buka file Excel lokal</strong> lalu pilih workbook Anda.`);
    });
  </script>
</body>
</html>
