<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jadwal Perkuliahan Mahasiswa</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root{
      --bg:#dfe7d6;
      --panel:rgba(255,255,255,.82);
      --navy:#1f4e95;
      --navy-dark:#173d75;
      --text:#102030;
      --muted:#4d5b68;
      --grid:#4a4a4a;
      --special:#d9ead3;
      --special-dark:#244e14;
      --empty:#d9d9d9;
      --room-f6:#f2f500;
      --room-f4:#12d9e7;
      --room-default:#dce6f1;
      --radius:18px;
      --shadow:0 12px 32px rgba(0,0,0,.12);
    }

    *{box-sizing:border-box}

    html,body{
      width:100%;
      height:100%;
      margin:0;
      overflow:hidden;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:
        linear-gradient(rgba(223,231,214,.90), rgba(223,231,214,.90)),
        radial-gradient(circle at top left, #ffffff 0%, #dfe7d6 46%, #c8d5bf 100%);
    }

    .app{
      width:100%;
      height:100vh;
      padding:6px;
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .header-panel,.ticker-panel,.table-panel{
      background:var(--panel);
      border:1px solid rgba(255,255,255,.55);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      backdrop-filter:blur(3px);
    }

    .header-panel{
      flex:0 0 auto;
      padding:12px 16px 10px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .header-main{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:18px;
    }

    .title-wrap{
      min-width:0;
    }

    .title-wrap h1{
      margin:0 0 6px;
      color:var(--navy-dark);
      font-size:clamp(28px, 3.15vw, 64px);
      line-height:1.03;
      letter-spacing:.2px;
    }

    .title-wrap p{
      margin:0;
      color:var(--muted);
      font-size:clamp(13px, 1vw, 20px);
      line-height:1.35;
    }

    .clock{
      flex:0 0 auto;
      text-align:right;
      min-width:260px;
    }

    .clock-time{
      color:var(--navy-dark);
      font-size:clamp(40px, 4vw, 84px);
      font-weight:800;
      line-height:1;
      letter-spacing:1px;
    }

    .clock-date{
      margin-top:6px;
      color:var(--muted);
      font-size:clamp(14px, 1.1vw, 22px);
    }

    .toolbar{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .day-buttons,.action-buttons{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }

    .status-inline{
      margin-left:auto;
      color:var(--muted);
      font-size:13px;
      font-weight:700;
      line-height:1.45;
      text-align:right;
    }

    .day-btn,.action-btn,.file-label{
      border:0;
      border-radius:999px;
      padding:9px 15px;
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      white-space:nowrap;
      transition:.18s ease;
    }

    .day-btn{
      background:#e8eef8;
      color:var(--navy-dark);
    }

    .day-btn.active,.day-btn:hover{
      background:var(--navy);
      color:#fff;
    }

    .action-btn,.file-label{
      background:#eef4ea;
      color:#25440f;
      border:1px solid #cfddc3;
    }

    .action-btn:hover,.file-label:hover{
      background:#dfead7;
    }

    .file-label input{ display:none; }

    .ticker-panel{
      flex:0 0 auto;
      min-height:36px;
      display:flex;
      align-items:center;
      overflow:hidden;
      padding:0 12px;
      color:#fff;
      background:linear-gradient(90deg, #173d76 0%, #2458a7 50%, #173d76 100%);
    }

    .ticker-label{
      flex:0 0 auto;
      margin-right:14px;
      font-size:13px;
      font-weight:800;
      letter-spacing:.3px;
    }

    .ticker-viewport{
      flex:1 1 auto;
      min-width:0;
      white-space:nowrap;
      overflow:hidden;
      position:relative;
      height:22px;
      display:flex;
      align-items:center;
    }

    .ticker-track{
      display:inline-block;
      white-space:nowrap;
      padding-left:100%;
      will-change:transform;
      animation:tickerMove 38s linear infinite;
      font-size:13px;
      font-weight:700;
    }

    @keyframes tickerMove{
      from{transform:translateX(0)}
      to{transform:translateX(-100%)}
    }

    .table-panel{
      flex:1 1 auto;
      min-height:0;
      padding:6px;
      overflow:hidden;
      display:flex;
    }

    .table-stage{
      flex:1 1 auto;
      min-width:0;
      min-height:0;
      overflow:hidden;
      position:relative;
      border-radius:14px;
      background:rgba(255,255,255,.26);
    }

    .table-scale-wrap{
      position:absolute;
      inset:0;
      overflow:hidden;
    }

    .table-scale{
      position:absolute;
      top:0;
      left:0;
      width:100%;
      transform-origin:top left;
      will-change:transform;
    }

    table.schedule{
      width:100%;
      border-collapse:collapse;
      table-layout:fixed;
      background:#fff;
      box-shadow:0 0 0 1px rgba(0,0,0,.06);
      --thead-height:38px;
      --row-height:42px;
      --special-row-height:28px;
      --header-font:12px;
      --cell-font:11px;
      --code-font:10px;
      --meta-font:9.5px;
      --special-font:11px;
      --session-font:12px;
    }

    .schedule th,.schedule td{
      border:1px solid var(--grid);
      text-align:center;
      vertical-align:middle;
      padding:2px 4px;
    }

    .schedule thead th{
      height:var(--thead-height);
      font-size:var(--header-font);
      font-weight:800;
      color:#fff;
      background:var(--navy);
    }

    .schedule thead th.room-head{
      color:#111;
    }

    .schedule thead th.room-head.group-f6{ background:var(--room-f6); }
    .schedule thead th.room-head.group-f4{ background:var(--room-f4); }
    .schedule thead th.room-head.group-default{ background:var(--room-default); }

    td.session-cell,td.session-empty{
      background:#f7f7f7;
      font-size:var(--session-font);
      font-weight:700;
    }

    td.time-cell{
      background:#f2f2f2;
      font-size:var(--session-font);
      font-weight:700;
      white-space:nowrap;
      height:var(--row-height);
    }

    td.empty-cell{
      background:var(--empty);
      height:var(--row-height);
    }

    td.course-cell{
      height:var(--row-height);
      font-size:var(--cell-font);
      line-height:1.14;
      font-weight:700;
      word-break:break-word;
      overflow-wrap:anywhere;
    }

    .course-code{
      font-size:var(--code-font);
      margin-bottom:1px;
      line-height:1.05;
    }

    .course-name{
      font-size:var(--cell-font);
      font-weight:800;
      margin-bottom:1px;
      line-height:1.08;
    }

    .course-meta{
      font-size:var(--meta-font);
      font-weight:600;
      margin-top:1px;
      opacity:.96;
      line-height:1.05;
    }

    td.special-time{
      background:#eef5e8;
      font-size:var(--special-font);
      font-weight:700;
      height:var(--special-row-height);
    }

    td.special-cell{
      background:var(--special);
      color:var(--special-dark);
      font-size:var(--special-font);
      font-weight:800;
      letter-spacing:.12px;
      padding:2px 6px;
      height:var(--special-row-height);
    }

    .error-box{
      margin:10px;
      padding:16px;
      border-radius:12px;
      background:#fff0f0;
      border:1px solid #efb0b0;
      color:#7b1d1d;
      font-size:14px;
      line-height:1.5;
    }

    @media (max-width:1100px){
      .status-inline{
        margin-left:0;
        width:100%;
        text-align:left;
      }
    }

    @media (max-width:880px){
      .header-main{
        flex-direction:column;
      }
      .clock{
        text-align:left;
        min-width:0;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="header-panel">
      <div class="header-main">
        <div class="title-wrap">
          <h1>Jadwal Perkuliahan Mahasiswa</h1>
          <p>Data dibaca dari file Excel multi-sheet. Tampilan disesuaikan proporsional agar penuh di area layar tanpa terlihat ditarik.</p>
        </div>
        <div class="clock">
          <div class="clock-time" id="clockTime">--:--:--</div>
          <div class="clock-date" id="clockDate">Memuat tanggal...</div>
        </div>
      </div>

      <div class="toolbar">
        <div class="day-buttons" id="dayButtons"></div>
        <div class="action-buttons">
          <button class="action-btn" id="reloadBtn" type="button">Muat ulang file default</button>
          <label class="file-label" for="fileInput">Buka file Excel lokal
            <input id="fileInput" type="file" accept=".xlsx,.xls" />
          </label>
        </div>
        <div class="status-inline" id="statusText">Menunggu data...</div>
      </div>
    </section>

    <section class="ticker-panel">
      <div class="ticker-label">INFO PERKULIAHAN</div>
      <div class="ticker-viewport">
        <div class="ticker-track" id="tickerTrack">Memuat informasi perkuliahan tambahan...</div>
      </div>
    </section>

    <section class="table-panel">
      <div class="table-stage" id="tableStage">
        <div class="error-box">Sedang memuat file Excel...</div>
      </div>
    </section>
  </div>

  <script>
    const CONFIG = {
      workbookFile: './template_jadwal_perkuliahan_mahasiswa_github.xlsx',
      requiredSheets: ['SLOT_WAKTU', 'RUANG_DISPLAY', 'JADWAL_KULIAH'],
      fallbackDays: ['Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'],
      roomHeaderClasses: { F6: 'group-f6', F4: 'group-f4' },
      autoRefreshMs: 60000,
      tickerFallback: 'Selamat datang. Pastikan hadir tepat waktu dan perhatikan informasi akademik terbaru.'
    };

    const state = {
      workbook: null,
      data: null,
      selectedDay: 'Senin',
      sourceLabel: 'file default',
      sourceKind: 'default',
      workbookHash: '',
      autoRefreshTimer: null,
      autoRefreshBusy: false,
      lastSyncText: '-'
    };

    const el = {
      tableStage: document.getElementById('tableStage'),
      dayButtons: document.getElementById('dayButtons'),
      reloadBtn: document.getElementById('reloadBtn'),
      fileInput: document.getElementById('fileInput'),
      statusText: document.getElementById('statusText'),
      tickerTrack: document.getElementById('tickerTrack'),
      clockTime: document.getElementById('clockTime'),
      clockDate: document.getElementById('clockDate')
    };

    function normalizeText(value){
      return String(value ?? '').trim();
    }

    function normalizeKey(value){
      return normalizeText(value)
        .normalize('NFKD')
        .replace(/[^a-zA-Z0-9/]+/g, '')
        .toUpperCase();
    }

    function isYes(value){
      return ['ya', 'y', 'true', '1', 'aktif'].includes(normalizeText(value).toLowerCase());
    }

    function escapeHtml(value){
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function normalizeHexColor(value){
      const raw = normalizeText(value).replace(/[^#a-fA-F0-9]/g, '');
      if (!raw) return '';
      if (raw.startsWith('#')) {
        if (raw.length === 4) return ('#' + raw.slice(1).split('').map(ch => ch + ch).join('')).toUpperCase();
        if (raw.length === 7) return raw.toUpperCase();
        if (raw.length === 9) return ('#' + raw.slice(3)).toUpperCase();
      }
      if (/^[A-Fa-f0-9]{6}$/.test(raw)) return ('#' + raw).toUpperCase();
      if (/^[A-Fa-f0-9]{8}$/.test(raw)) return ('#' + raw.slice(2)).toUpperCase();
      return '';
    }

    function getCanonicalKey(rawKey){
      const key = normalizeKey(rawKey);
      const aliasMap = {
        HARI: 'HARI', HARIKULIAH: 'HARI', DAY: 'HARI',
        KODERUANG: 'KODE_RUANG', RUANG: 'KODE_RUANG', RUANGAN: 'KODE_RUANG',
        IDSLOTMULAI: 'ID_SLOT_MULAI', SLOTMULAI: 'ID_SLOT_MULAI', STARTSLOT: 'ID_SLOT_MULAI',
        IDSLOTSELESAI: 'ID_SLOT_SELESAI', SLOTSELESAI: 'ID_SLOT_SELESAI', ENDSLOT: 'ID_SLOT_SELESAI',
        KODEMK: 'KODE_MK', MATAKULIAHKODE: 'KODE_MK',
        NAMAMK: 'NAMA_MK', MATAKULIAH: 'NAMA_MK', NAMAMATAKULIAH: 'NAMA_MK',
        DOSEN: 'DOSEN', DOSENPENGAMPU: 'DOSEN',
        PROGRAMANGKATAN: 'PROGRAM/ANGKATAN', PROGRAM: 'PROGRAM/ANGKATAN', ANGKATAN: 'PROGRAM/ANGKATAN',
        WARNABG: 'WARNA_BG', BACKGROUND: 'WARNA_BG', BGCOLOR: 'WARNA_BG',
        WARNATEXT: 'WARNA_TEXT', TEXTCOLOR: 'WARNA_TEXT', FONTCOLOR: 'WARNA_TEXT',
        KETERANGAN: 'CATATAN', NOTE: 'CATATAN'
      };
      return aliasMap[key] || rawKey;
    }

    function sheetToObjects(workbook, sheetName){
      const sheet = workbook.Sheets[sheetName];
      if (!sheet) return [];
      return XLSX.utils.sheet_to_json(sheet, { defval: '' });
    }

    function sheetToObjectsWithMeta(workbook, sheetName){
      const sheet = workbook.Sheets[sheetName];
      if (!sheet || !sheet['!ref']) return [];
      const range = XLSX.utils.decode_range(sheet['!ref']);
      const headers = [];
      for (let c = range.s.c; c <= range.e.c; c += 1) {
        const address = XLSX.utils.encode_cell({ r: range.s.r, c });
        headers.push(normalizeText(sheet[address]?.v));
      }

      const rows = [];
      for (let r = range.s.r + 1; r <= range.e.r; r += 1) {
        const rowObj = { __sheetName: sheetName, __sheetRowNum: r + 1 };
        let hasContent = false;
        headers.forEach((header, idx) => {
          if (!header) return;
          const address = XLSX.utils.encode_cell({ r, c: range.s.c + idx });
          const cell = sheet[address];
          const value = cell?.v ?? '';
          rowObj[getCanonicalKey(header)] = value;
          if (normalizeText(value) !== '') hasContent = true;
        });
        if (hasContent) rows.push(rowObj);
      }
      return rows;
    }

    function getStyleColorToken(colorObj){
      if (!colorObj) return '';
      if (typeof colorObj === 'string') return normalizeHexColor(colorObj);
      return normalizeHexColor(colorObj.rgb || colorObj.argb || colorObj.value || colorObj.raw || colorObj.hex || '');
    }

    function extractColorsFromCell(cell){
      if (!cell || !cell.s) return { bg: '', text: '' };
      const style = cell.s;
      const bg = getStyleColorToken(style.fill?.fgColor) || getStyleColorToken(style.fill?.bgColor) || getStyleColorToken(style.fgColor) || getStyleColorToken(style.bgColor);
      const text = getStyleColorToken(style.font?.color) || getStyleColorToken(style.color);
      return { bg, text };
    }

    function buildCanonicalHeaderMap(workbook, sheetName){
      const map = new Map();
      const sheet = workbook.Sheets[sheetName];
      if (!sheet || !sheet['!ref']) return map;
      const range = XLSX.utils.decode_range(sheet['!ref']);
      for (let c = range.s.c; c <= range.e.c; c += 1) {
        const address = XLSX.utils.encode_cell({ r: range.s.r, c });
        const header = normalizeText(sheet[address]?.v);
        if (header) map.set(getCanonicalKey(header), c);
      }
      return map;
    }

    function getSheetCell(workbook, sheetName, rowNum, headerMap, canonicalHeader){
      const colIndex = headerMap.get(canonicalHeader);
      if (colIndex === undefined) return null;
      const sheet = workbook.Sheets[sheetName];
      const address = XLSX.utils.encode_cell({ r: Number(rowNum) - 1, c: colIndex });
      return sheet?.[address] || null;
    }

    function enrichScheduleColors(workbook, row, headerMap){
      row.WARNA_BG = normalizeHexColor(row.WARNA_BG);
      row.WARNA_TEXT = normalizeHexColor(row.WARNA_TEXT);

      if (row.WARNA_BG && row.WARNA_TEXT) return row;

      const probeHeaders = ['WARNA_BG', 'WARNA_TEXT', 'NAMA_MK', 'KODE_MK', 'CATATAN'];
      for (const header of probeHeaders) {
        const cell = getSheetCell(workbook, 'JADWAL_KULIAH', row.__sheetRowNum, headerMap, header);
        const colors = extractColorsFromCell(cell);
        if (!row.WARNA_BG && colors.bg) row.WARNA_BG = colors.bg;
        if (!row.WARNA_TEXT && colors.text) row.WARNA_TEXT = colors.text;
        if (row.WARNA_BG && row.WARNA_TEXT) break;
      }

      if (!row.WARNA_BG) row.WARNA_BG = '#D9D9D9';
      if (!row.WARNA_TEXT) row.WARNA_TEXT = '#111111';
      return row;
    }

    function buildDataModel(workbook){
      const sheetNames = workbook.SheetNames || [];

      const slots = sheetToObjects(workbook, 'SLOT_WAKTU')
        .filter(row => !normalizeText(row.TAMPIL_DI_LAYAR) || isYes(row.TAMPIL_DI_LAYAR))
        .sort((a,b) => Number(a.URUTAN || 0) - Number(b.URUTAN || 0));

      const rooms = sheetToObjects(workbook, 'RUANG_DISPLAY')
        .filter(row => !normalizeText(row.AKTIF) || isYes(row.AKTIF))
        .sort((a,b) => Number(a.URUTAN_KOLOM || 0) - Number(b.URUTAN_KOLOM || 0));

      const scheduleHeaderMap = buildCanonicalHeaderMap(workbook, 'JADWAL_KULIAH');
      const schedules = sheetToObjectsWithMeta(workbook, 'JADWAL_KULIAH')
        .filter(row => !normalizeText(row.AKTIF) || isYes(row.AKTIF))
        .map(row => enrichScheduleColors(workbook, row, scheduleHeaderMap));

      const holidays = sheetToObjects(workbook, 'LIBUR_AKADEMIK')
        .filter(row => !normalizeText(row.TAMPIL_DI_APLIKASI) || isYes(row.TAMPIL_DI_APLIKASI));

      const availableDaysSet = new Set();
      schedules.forEach(row => {
        const day = normalizeText(row.HARI);
        if (day) availableDaysSet.add(day);
      });

      const orderedDays = CONFIG.fallbackDays.filter(day => availableDaysSet.has(day));
      const extraDays = [...availableDaysSet].filter(day => !orderedDays.includes(day));

      return {
        sheetNames,
        slots,
        rooms,
        schedules,
        holidays,
        days: [...orderedDays, ...extraDays]
      };
    }

    function groupSessionRows(slots){
      const groups = new Map();
      slots.forEach(slot => {
        if (normalizeText(slot.TIPE_BARIS).toUpperCase() === 'KULIAH') {
          const key = normalizeText(slot.SESI) || '-';
          groups.set(key, (groups.get(key) || 0) + 1);
        }
      });
      return groups;
    }

    function getRoomHeaderClass(room){
      const group = normalizeText(room.GRUP_WARNA).toUpperCase();
      return CONFIG.roomHeaderClasses[group] || 'group-default';
    }

    function formatSpecialText(slot){
      return normalizeText(slot.KETERANGAN) || 'Informasi akademik';
    }

    function getTodayName(){
      const names = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
      return names[new Date().getDay()];
    }

    function getScheduleItemForSlot(day, roomCode, slotId){
      const targetDay = normalizeText(day).toLowerCase();
      const targetRoom = normalizeText(roomCode);
      const numericSlot = Number(slotId);

      return state.data.schedules.find(item => {
        const itemDay = normalizeText(item.HARI).toLowerCase();
        const itemRoom = normalizeText(item.KODE_RUANG);
        const start = Number(item.ID_SLOT_MULAI);
        const end = Number(item.ID_SLOT_SELESAI || item.ID_SLOT_MULAI);
        return itemDay === targetDay && itemRoom === targetRoom && numericSlot >= start && numericSlot <= end;
      }) || null;
    }

    function renderCourseCell(item){
      const bg = normalizeHexColor(item.WARNA_BG) || '#D9D9D9';
      const color = normalizeHexColor(item.WARNA_TEXT) || '#111111';
      return `
        <td class="course-cell" style="background:${escapeHtml(bg)};color:${escapeHtml(color)};">
          <div class="course-code">${escapeHtml(item.KODE_MK || '')}${item.KELAS ? ` (${escapeHtml(item.KELAS)})` : ''}</div>
          <div class="course-name">${escapeHtml(item.NAMA_MK || '')}</div>
          ${item.DOSEN ? `<div class="course-meta">Dosen : ${escapeHtml(item.DOSEN)}</div>` : ''}
          ${item['PROGRAM/ANGKATAN'] ? `<div class="course-meta">${escapeHtml(item['PROGRAM/ANGKATAN'])}</div>` : ''}
          ${item.CATATAN ? `<div class="course-meta">${escapeHtml(item.CATATAN)}</div>` : ''}
        </td>
      `;
    }

    function buildTickerText(holidays){
      const items = holidays
        .map(row => {
          const tanggal = normalizeText(row.TANGGAL);
          const jenis = normalizeText(row.JENIS);
          const ket = normalizeText(row.KETERANGAN);
          return [tanggal, jenis, ket].filter(Boolean).join(' - ');
        })
        .filter(Boolean);

      return items.length ? items.join('  •  ') : CONFIG.tickerFallback;
    }

    function renderTicker(){
      el.tickerTrack.textContent = state.data ? buildTickerText(state.data.holidays) : CONFIG.tickerFallback;
    }

    function updateStatus(){
      if (!state.data) {
        el.statusText.textContent = 'Menunggu data...';
        return;
      }
      const refreshLabel = state.sourceKind === 'default'
        ? `auto-refresh aktif / ${Math.round(CONFIG.autoRefreshMs / 1000)} dtk`
        : 'auto-refresh nonaktif';
      el.statusText.innerHTML = [
        `Hari aktif: <strong>${escapeHtml(state.selectedDay)}</strong>`,
        `Ruang: <strong>${state.data.rooms.length}</strong>`,
        `Slot tampil: <strong>${state.data.slots.length}</strong>`,
        `Jadwal aktif: <strong>${state.data.schedules.length}</strong>`,
        refreshLabel,
        `Sumber: <strong>${escapeHtml(state.sourceLabel)}</strong>`,
        `Sinkron terakhir: <strong>${escapeHtml(state.lastSyncText)}</strong>`
      ].join(' &nbsp;&middot;&nbsp; ');
    }

    function renderDayButtons(){
      if (!state.data || !state.data.days.length) {
        el.dayButtons.innerHTML = '';
        return;
      }

      el.dayButtons.innerHTML = state.data.days
        .map(day => `<button type="button" class="day-btn ${day === state.selectedDay ? 'active' : ''}" data-day="${escapeHtml(day)}">${escapeHtml(day)}</button>`)
        .join('');

      el.dayButtons.querySelectorAll('.day-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          state.selectedDay = btn.dataset.day;
          renderDayButtons();
          renderTable(state.selectedDay);
          updateStatus();
        });
      });
    }

    function applyResponsiveTableSize(){
      const table = document.getElementById('scheduleTable');
      if (!table || !state.data) return;

      const slots = state.data.slots || [];
      const kuliahCount = Math.max(1, slots.filter(slot => normalizeText(slot.TIPE_BARIS).toUpperCase() === 'KULIAH').length);
      const specialCount = Math.max(0, slots.length - kuliahCount);

      const stageWidth = Math.max(320, el.tableStage.clientWidth);
      const stageHeight = Math.max(240, el.tableStage.clientHeight);

      const headerHeight = Math.max(28, Math.min(40, stageHeight * 0.034));
      const specialWeight = 0.60;
      const borderReserve = (slots.length + 6) * 2;
      const bodyHeight = Math.max(110, stageHeight - headerHeight - borderReserve);
      const baseUnit = bodyHeight / (kuliahCount + (specialCount * specialWeight));
      const rowHeight = Math.max(24, Math.min(36, baseUnit));
      const specialRowHeight = Math.max(18, Math.min(24, baseUnit * specialWeight));

      const roomCount = Math.max(1, state.data.rooms.length);
      const headerFont = Math.max(10, Math.min(14, stageWidth / (roomCount * 10.8)));
      const sessionFont = Math.max(9.5, Math.min(12.5, rowHeight * 0.28));
      const cellFont = Math.max(8.5, Math.min(11.5, rowHeight * 0.23));
      const codeFont = Math.max(7.5, Math.min(10.5, rowHeight * 0.19));
      const metaFont = Math.max(7, Math.min(9.8, rowHeight * 0.17));
      const specialFont = Math.max(8.5, Math.min(10.5, specialRowHeight * 0.42));

      table.style.setProperty('--thead-height', `${headerHeight}px`);
      table.style.setProperty('--row-height', `${rowHeight}px`);
      table.style.setProperty('--special-row-height', `${specialRowHeight}px`);
      table.style.setProperty('--header-font', `${headerFont}px`);
      table.style.setProperty('--session-font', `${sessionFont}px`);
      table.style.setProperty('--cell-font', `${cellFont}px`);
      table.style.setProperty('--code-font', `${codeFont}px`);
      table.style.setProperty('--meta-font', `${metaFont}px`);
      table.style.setProperty('--special-font', `${specialFont}px`);

      requestAnimationFrame(fitTableWithoutStretch);
    }

    function fitTableWithoutStretch(){
      const stage = el.tableStage;
      const scaleBox = document.getElementById('tableScale');
      const table = document.getElementById('scheduleTable');
      if (!stage || !scaleBox || !table) return;

      scaleBox.style.transform = 'translate(0px, 0px) scale(1)';
      const stageWidth = Math.max(320, stage.clientWidth);
      const stageHeight = Math.max(240, stage.clientHeight);
      const tableHeight = table.offsetHeight;

      let scale = 1;
      if (tableHeight > stageHeight) {
        scale = stageHeight / tableHeight;
      }

      const scaledWidth = stageWidth * scale;
      const scaledHeight = tableHeight * scale;
      const offsetX = Math.max(0, (stageWidth - scaledWidth) / 2);
      const offsetY = Math.max(0, (stageHeight - scaledHeight) / 2);

      scaleBox.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
    }

    function renderTable(day){
      if (!state.data) return;

      const slots = state.data.slots;
      const rooms = state.data.rooms;
      const sessionGroups = groupSessionRows(slots);
      const renderedSessionStart = new Set();

      let html = `
        <div class="table-scale-wrap">
          <div class="table-scale" id="tableScale">
            <table class="schedule" id="scheduleTable">
            <colgroup>
              <col style="width:66px;">
              <col style="width:96px;">
              ${rooms.map(() => '<col>').join('')}
            </colgroup>
            <thead>
              <tr>
                <th>SESI</th>
                <th>JAM</th>
                ${rooms.map(room => `<th class="room-head ${getRoomHeaderClass(room)}">${escapeHtml(room.NAMA_TAMPIL || room.KODE_RUANG)}</th>`).join('')}
              </tr>
            </thead>
            <tbody>
      `;

      for (const slot of slots) {
        const slotType = normalizeText(slot.TIPE_BARIS).toUpperCase();
        const slotId = Number(slot.ID_SLOT);
        html += '<tr>';

        if (slotType === 'KULIAH') {
          const sesi = normalizeText(slot.SESI) || '-';
          if (!renderedSessionStart.has(sesi)) {
            html += `<td class="session-cell" rowspan="${sessionGroups.get(sesi) || 1}">${escapeHtml(sesi)}</td>`;
            renderedSessionStart.add(sesi);
          }

          html += `<td class="time-cell">${escapeHtml(slot.LABEL_TAMPIL)}</td>`;

          for (const room of rooms) {
            const item = getScheduleItemForSlot(day, room.KODE_RUANG, slotId);
            html += item ? renderCourseCell(item) : '<td class="empty-cell"></td>';
          }
        } else {
          html += '<td class="session-empty"></td>';
          html += `<td class="special-time">${escapeHtml(slot.LABEL_TAMPIL)}</td>`;
          html += `<td class="special-cell" colspan="${rooms.length}">${escapeHtml(formatSpecialText(slot))}</td>`;
        }

        html += '</tr>';
      }

      html += `
            </tbody>
            </table>
          </div>
        </div>
      `;

      el.tableStage.innerHTML = html;
      requestAnimationFrame(() => {
        applyResponsiveTableSize();
        requestAnimationFrame(fitTableWithoutStretch);
      });
    }

    function showError(message){
      el.tableStage.innerHTML = `<div class="error-box">${message}</div>`;
    }

    function validateRequiredSheets(data){
      const missing = CONFIG.requiredSheets.filter(name => !data.sheetNames.includes(name));
      if (missing.length) throw new Error(`Sheet wajib belum ditemukan: ${missing.join(', ')}`);
    }

    async function hashArrayBuffer(arrayBuffer){
      if (window.crypto?.subtle) {
        const hashBuffer = await crypto.subtle.digest('SHA-256', arrayBuffer.slice(0));
        return [...new Uint8Array(hashBuffer)].map(b => b.toString(16).padStart(2, '0')).join('');
      }
      return `len-${arrayBuffer.byteLength}`;
    }

    function timeStampText(){
      return new Intl.DateTimeFormat('id-ID', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      }).format(new Date());
    }

    async function applyWorkbook(arrayBuffer, sourceLabel, sourceKind){
      const workbook = XLSX.read(arrayBuffer, { type: 'array', cellStyles: true });
      const data = buildDataModel(workbook);
      validateRequiredSheets(data);

      state.workbook = workbook;
      state.data = data;
      state.sourceLabel = sourceLabel;
      state.sourceKind = sourceKind;
      state.workbookHash = await hashArrayBuffer(arrayBuffer);
      state.lastSyncText = timeStampText();

      if (!data.days.includes(state.selectedDay)) {
        const todayName = getTodayName();
        state.selectedDay = data.days.includes(todayName) ? todayName : (data.days[0] || CONFIG.fallbackDays[0]);
      }

      renderTicker();
      renderDayButtons();
      renderTable(state.selectedDay);
      updateStatus();
      configureAutoRefresh();
    }

    async function fetchWorkbookArrayBuffer(){
      const response = await fetch(`${CONFIG.workbookFile}?v=${Date.now()}`, { cache: 'no-store' });
      if (!response.ok) throw new Error(`Gagal mengambil file Excel dari ${CONFIG.workbookFile}`);
      return await response.arrayBuffer();
    }

    async function loadDefaultWorkbook(){
      const buffer = await fetchWorkbookArrayBuffer();
      await applyWorkbook(buffer, 'file default', 'default');
    }

    async function loadLocalWorkbook(file){
      const buffer = await file.arrayBuffer();
      await applyWorkbook(buffer, file.name, 'local');
    }

    function stopAutoRefresh(){
      if (state.autoRefreshTimer) {
        clearInterval(state.autoRefreshTimer);
        state.autoRefreshTimer = null;
      }
    }

    function configureAutoRefresh(){
      stopAutoRefresh();
      if (state.sourceKind !== 'default') return;

      state.autoRefreshTimer = setInterval(async () => {
        if (state.autoRefreshBusy) return;
        state.autoRefreshBusy = true;
        try {
          const buffer = await fetchWorkbookArrayBuffer();
          const nextHash = await hashArrayBuffer(buffer);
          if (nextHash !== state.workbookHash) {
            await applyWorkbook(buffer, 'file default', 'default');
          } else {
            state.lastSyncText = timeStampText();
            updateStatus();
          }
        } catch (error) {
          console.error(error);
        } finally {
          state.autoRefreshBusy = false;
        }
      }, CONFIG.autoRefreshMs);
    }

    function startClock(){
      const timeFormatter = new Intl.DateTimeFormat('id-ID', {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });
      const dateFormatter = new Intl.DateTimeFormat('id-ID', {
        weekday: 'long',
        day: '2-digit',
        month: 'long',
        year: 'numeric'
      });

      const tick = () => {
        const now = new Date();
        el.clockTime.textContent = timeFormatter.format(now);
        el.clockDate.textContent = dateFormatter.format(now);
      };

      tick();
      setInterval(tick, 1000);
    }

    window.addEventListener('resize', () => {
      requestAnimationFrame(() => {
        applyResponsiveTableSize();
        requestAnimationFrame(fitTableWithoutStretch);
      });
    });

    el.reloadBtn.addEventListener('click', async () => {
      try {
        await loadDefaultWorkbook();
      } catch (error) {
        showError(error.message);
      }
    });

    el.fileInput.addEventListener('change', async (event) => {
      const file = event.target.files?.[0];
      if (!file) return;
      try {
        await loadLocalWorkbook(file);
      } catch (error) {
        showError(error.message);
      }
    });

    startClock();
    loadDefaultWorkbook().catch(error => {
      showError(`${error.message}<br><br>Silakan gunakan tombol <strong>Buka file Excel lokal</strong> sebagai alternatif.`);
    });
  </script>
</body>
</html>
